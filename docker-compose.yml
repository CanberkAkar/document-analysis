
services:
  # ─── Frontend (Next.js) ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_COMMUNICATION_SECRET=${NEXT_PUBLIC_COMMUNICATION_SECRET:-super_secret_comm_key_123!}
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - NEXT_PUBLIC_COMMUNICATION_SECRET=${NEXT_PUBLIC_COMMUNICATION_SECRET:-super_secret_comm_key_123!}
    depends_on:
      - backend
    networks:
      - ai_network
    restart: unless-stopped

  # ─── Backend (NestJS) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=legal_db
      - QDRANT_URL=http://qdrant:6333
      - JWT_SECRET=super_secret_legal_key_123!
      - ADMIN_EMAIL=admin@hukuk.ai
      - ADMIN_PASSWORD=Admin123!
      - OPENAI_API_KEY=${OPENAI_API_KEY:-dummy_key_for_build}
      - COMMUNICATION_SECRET=${COMMUNICATION_SECRET:-super_secret_comm_key_123!}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - ai_network
    restart: unless-stopped

  # ─── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: legal_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - ai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d legal_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Qdrant Vector Database ────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai_network
    restart: unless-stopped

volumes:
  pg_data:
  qdrant_data:

networks:
  ai_network:
    driver: bridge
